---
# ============================================
# Флаги управления репозиториями
# ============================================

# Удалить ВСЕ существующие репозитории перед добавлением новых
awesome_remove_all_repos: false

# Конвертировать существующие репозитории в формат deb822
awesome_convert_to_deb822: false


# ============================================
# Обновление системы
# ============================================

# Обновить все пакеты (apt_upgrade)
# Возможные значения: true, false, 'dist', 'full', 'safe'
# true/'yes' — upgrade все пакеты
# 'dist' — apt-get dist-upgrade
# 'full' — apt-get full-upgrade (замена dist-upgrade в новых версиях)
# 'safe' — безопасное обновление (только существующие пакеты)
apt_upgrade: false

# Автоматически удалять ненужные зависимости после обновления
apt_autoremove: false

# Время кэширования apt в секундах
apt_cache_valid_time: 3600

# ============================================
# Списки пакетов для установки
# ============================================

# Базовые системные пакеты
default_awesome_package_list_base: []

# Пакеты для рабочего стола (Mate/Ubuntu/Debian)
default_awesome_package_list_desktop: []

# Системные утилиты
default_awesome_package_list_system:
  - python3
  - nano
  - sudo
  - unzip
  - tmux
  - apt-transport-https
  - software-properties-common
  - htop

# Мультимедиа пакеты
default_awesome_package_list_multimedia: []
# Сетевые утилиты и клиенты
default_awesome_package_list_network:
  - net-tools
  - ca-certificates
  - wget
  - openssh-server
  - curl
  - traceroute
  - mtr-tiny
  - tcpdump
  - whois
  - telnet
  - dnsutils

# ============================================
# Пользовательские списки (переопределяются в vars)
# ============================================
custom_awesome_package_list_base: []
custom_awesome_package_list_desktop: []
custom_awesome_package_list_system: []
custom_awesome_package_list_multimedia: []
custom_awesome_package_list_network: []

# ============================================
# Репозитории (примеры описания)
# ============================================
#
# Список кастомных репозиториев пользователя
# Репозитории ОБЯЗАТЕЛЬНО задаются через словарь.
#
# Два формата:
#
# 1. LEGACY ФОРМАТ (создаётся файл .list)
#    Используется для обычных deb-строк и PPA.
#    Поля:
#      - repo: строка с описанием репозитория (deb-строка или ppa:имя)
#      - file: имя файла (без расширения, будет создан file.list)
#
#    Примеры:
#      - repo: "deb http://archive.ubuntu.com/ubuntu noble main restricted"
#        file: "ubuntu_main"
#      
#      - repo: "ppa:nginx/stable"
#        file: "nginx"
#      
#      - repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu noble stable"
#        file: "docker"
#
# 2. DEB822 ФОРМАТ (создаётся файл .sources)
#    Используется для полного контроля над репозиторием в формате deb822.
#    Поля:
#      - name: имя файла (без расширения, будет создан name.sources)
#      - type: тип репозитория (обычно 'deb')
#      - uris: URI репозитория
#      - suites: кодовое имя релиза (например, 'noble', 'trixie')
#      - components: список компонентов (например, ['main', 'universe'])
#      - signed_by: путь к ключу GPG (опционально)
#      - architectures: список архитектур (опционально)
#
#    Пример:
#      - name: "zabbix"
#        type: "deb"
#        uris: "https://repo.zabbix.com/zabbix/7.0/debian/"
#        suites: "trixie"
#        components: ["main"]
#        architectures: ["amd64"]
#        signed_by: "/etc/apt/keyrings/zabbix-repo.asc"
#

awesome_repo_list: "{{ _default_awesome_repo_list }}"

# Список кастомных репозиториев пользователя
custom_awesome_repo_list: []

# ============================================
# Отладка
# ============================================

# Включить подробный вывод отладки (true/false)
awesome_debug: false
